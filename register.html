<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1,0">
        <title>Register</title>
        </head>
        <body>
            <div class="wrapper">
                <h1>Register</h1>
                <form>
                    <div>
                        <input type="text" name="Fullname" id="Fullname-input" placeholder="Fullname">   
                    </div>
                       <div>
                        <input type="email" name="email" id="email-input" placeholder="email">   
                    </div>
                       <div>
                        <input type="tel" name="phone" id="phone-input" placeholder="phone">   
                    </div>
                       <div>
                        <input type="text" name="username" id="username-input" placeholder="Username">
                    </div>
                    <div>
                      <input type="password" name="password" id="password-input" placeholder="Password">
                    </div>
                       <div>
                       <input type="password" name="confirm_password" id="confirm-password-input" placeholder="Confirm Password">
                    </div>
                    <div>
                      <select name="role" id="role-input">
                          <option value="">Select Role</option>
                          <option value="admin">Admin</option>
                          <option value="manager">Manager</option>
                          <option value="supplier">Supplier</option>
                          </select>
                          </div>

                          <button type="submit">Register</button>
                          </form>
            </div>
        </body>
</html>
